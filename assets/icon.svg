<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="eye-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background (full bleed for maskable) -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Red top rule -->
  <rect x="0" y="0" width="512" height="10" fill="#cc1a1a"/>

  <!-- ── Skull ── -->
  <!-- Cranium -->
  <ellipse cx="256" cy="208" rx="112" ry="106" fill="#e8e4dc"/>
  <!-- Cheekbones -->
  <ellipse cx="162" cy="236" rx="34" ry="20" fill="#d8d0c0"/>
  <ellipse cx="350" cy="236" rx="34" ry="20" fill="#d8d0c0"/>

  <!-- Eye sockets -->
  <ellipse cx="214" cy="200" rx="36" ry="40" fill="#0a0a0a"/>
  <ellipse cx="298" cy="200" rx="36" ry="40" fill="#0a0a0a"/>

  <!-- Glowing red eyes -->
  <ellipse cx="214" cy="200" rx="22" ry="25" fill="#cc1a1a" filter="url(#eye-glow)"/>
  <ellipse cx="298" cy="200" rx="22" ry="25" fill="#cc1a1a" filter="url(#eye-glow)"/>
  <ellipse cx="214" cy="200" rx="10" ry="12" fill="#e63030"/>
  <ellipse cx="298" cy="200" rx="10" ry="12" fill="#e63030"/>

  <!-- Nasal cavity -->
  <path d="M248 233 L256 250 L264 233" fill="#0a0a0a"/>

  <!-- Jaw -->
  <path d="M158 248 Q256 292 354 248 L349 268 Q256 312 163 268 Z" fill="#d8d0c0" stroke="#b8b0a0" stroke-width="1.5"/>

  <!-- Teeth -->
  <rect x="206" y="253" width="18" height="26" rx="3" fill="#f8f4ec" stroke="#c8c0b0" stroke-width="0.8"/>
  <rect x="228" y="253" width="18" height="28" rx="3" fill="#f8f4ec" stroke="#c8c0b0" stroke-width="0.8"/>
  <rect x="250" y="253" width="18" height="28" rx="3" fill="#f8f4ec" stroke="#c8c0b0" stroke-width="0.8"/>
  <rect x="272" y="253" width="18" height="26" rx="3" fill="#f8f4ec" stroke="#c8c0b0" stroke-width="0.8"/>

  <!-- ── D-OS wordmark ── -->
  <text x="256" y="430"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="800"
        fill="#cc1a1a" text-anchor="middle"
        letter-spacing="6">D-OS</text>

  <!-- Decorative rule under text -->
  <rect x="128" y="448" width="256" height="2" rx="1" fill="#2a2a2a"/>
</svg>
